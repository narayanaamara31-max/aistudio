<mat-toolbar color="primary" class="sticky top-0 z-50">
  <a routerLink="/" class="flex items-center gap-2 text-xl font-bold">
    <span class="text-brand-orange">Printora</span>
    <span class="text-brand-black">India</span>
  </a>
  
  <span class="spacer"></span>
  
  <!-- Desktop Menu -->
  <div class="hidden md:flex gap-4 items-center">
    <a routerLink="/" [routerLinkActiveOptions]="{exact: true}" routerLinkActive="active" mat-button>Home</a>
    <a routerLink="/services" routerLinkActive="active" mat-button>Services</a>
    <a routerLink="/how-it-works" routerLinkActive="active" mat-button>How It Works</a>
    <a routerLink="/gallery" routerLinkActive="active" mat-button>Gallery</a>
    <a routerLink="/pricing" routerLinkActive="active" mat-button>Pricing</a>
    <a routerLink="/contact" routerLinkActive="active" mat-button>Contact</a>
    <a href="https://wa.me/916304895538" target="_blank" mat-raised-button color="accent" class="flex items-center gap-2">
      <mat-icon>chat</mat-icon> WhatsApp
    </a>
  </div>
  
  <!-- Mobile Menu Button -->
  <button mat-icon-button class="md:hidden" (click)="isMenuOpen = !isMenuOpen">
    <mat-icon>{{ isMenuOpen ? 'close' : 'menu' }}</mat-icon>
  </button>
</mat-toolbar>

<!-- Mobile Menu -->
@if (isMenuOpen) {
  <div class="md:hidden bg-white border-b">
    <div class="p-4 space-y-2">
      <a routerLink="/" (click)="isMenuOpen = false" mat-button class="w-full">Home</a>
      <a routerLink="/services" (click)="isMenuOpen = false" mat-button class="w-full">Services</a>
      <a routerLink="/how-it-works" (click)="isMenuOpen = false" mat-button class="w-full">How It Works</a>
      <a routerLink="/gallery" (click)="isMenuOpen = false" mat-button class="w-full">Gallery</a>
      <a routerLink="/pricing" (click)="isMenuOpen = false" mat-button class="w-full">Pricing</a>
      <a routerLink="/contact" (click)="isMenuOpen = false" mat-button class="w-full">Contact</a>
      <a href="https://wa.me/916304895538" target="_blank" mat-raised-button color="accent" class="w-full mt-4">
        Order on WhatsApp
      </a>
    </div>
  </div>
}
